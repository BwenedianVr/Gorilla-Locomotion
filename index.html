<!DOCTYPE html>
<html>
  <head>
    <title>Game</title>
    <style>
      body { margin: 0; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <script type="module">
      import { GameStage } from './main.js';
      import { PlayerMovement } from './locomotion.js';
      import { GameMap } from './enviroment.js';

      const gameStage = new GameStage();
      const playerMovement = new PlayerMovement(gameStage);
      const gameMap = new GameMap(gameStage);

      function animate() {
        gameStage.update();
        playerMovement.update();
        gameMap.update();
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
